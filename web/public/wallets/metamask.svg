<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#1A1A1A"/>
  <!-- Simplified MetaMask fox: stylized polygon head in orange -->
  <g transform="translate(4 5)">
    <!-- left ear (light orange) -->
    <polygon points="2,2 8,7 5,11" fill="#E17726"/>
    <!-- right ear -->
    <polygon points="22,2 16,7 19,11" fill="#E17726"/>
    <!-- left side of head (mid orange) -->
    <polygon points="5,11 8,7 12,16 7,18" fill="#E27625"/>
    <!-- right side of head -->
    <polygon points="19,11 16,7 12,16 17,18" fill="#E27625"/>
    <!-- snout (lightest) -->
    <polygon points="9,16 12,16 15,16 14,21 10,21" fill="#F5841F"/>
    <!-- left eye -->
    <circle cx="9" cy="13" r="1.2" fill="#FFFFFF"/>
    <!-- right eye -->
    <circle cx="15" cy="13" r="1.2" fill="#FFFFFF"/>
  </g>
</svg>
